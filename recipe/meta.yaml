{% set name = "anchor-droplet-chip" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 2908f308c224df39f914f303b345b28bf6a0c317b33c86a5e4e73f413a7777ff

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.8
    - setuptools >=40.9.0
    - setuptools-scm
    - wheel
  run:
    - dask-core
    - fire
    - jupyterlab
    - magicgui
    - matplotlib-base
    - napari
    - nd2
    - numpy
    - pandas
    # - pytest-qt
    - python >=3.8
    - pyyaml
    - scikit-image
    - scipy
    - seaborn
    - tifffile
    - tqdm
    - zarr-tools
    - zenodo_get

test:
  imports:
    - adc
    - imreg_dft
  commands:
    - pip list
    # - pip check  # Fails due to pyqt6
  requires:
    - pip

about:
  home: https://pypi.org/project/anchor-droplet-chip
  summary: Segment organoids and measure intensities
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/BaroudLab/anchor-droplet-chip

extra:
  recipe-maintainers:
    - goanpeca
    - jaimergp
